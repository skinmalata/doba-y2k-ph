name: Build Android APK

on:
  push:
    paths:
      - 'doba_y2k_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doba_y2k_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Check Flutter version
        run: flutter --version

      - name: Accept Android licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

      - name: Regenerate Android project
        run: |
          cp pubspec.yaml pubspec.yaml.bak
          rm -rf android ios
          flutter create --project-name doba_y2k_app --org com.doba --platforms android .
          mv pubspec.yaml.bak pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release 2>&1

      - name: List build output
        run: ls -la build/app/outputs/flutter-apk/ || echo "No output dir found"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: doba-y2k-app-release
          path: doba_y2k_app/build/app/outputs/flutter-apk/*.apk
