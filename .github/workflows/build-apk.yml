name: Build Android APK

on:
  push:
    paths:
      - 'doba_y2k_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doba_y2k_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: |
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --licenses 2>/dev/null || true
          flutter config --android-sdk "$ANDROID_HOME" 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --verbose 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: doba-y2k-app-release
          path: doba_y2k_app/build/app/outputs/flutter-apk/app-release.apk
